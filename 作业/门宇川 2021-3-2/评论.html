<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>评论</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #root {
        width: 888px;
        margin: 15px auto;
        background-color: #efefef;
        padding: 20px;
        border-radius: 8px;
      }
      ul {
        padding: 0;
      }
      li {
        list-style: none;
        padding: 10px;
        border: 1px solid #ccc;
        border-top: 0;
      }
      li:first-child {
        border-top: 1px solid #ccc;
        border-radius: 6px 6px 0 0;
      }
      li:last-child {
        border-radius: 0 0 6px 6px;
      }
      li * {
        cursor: pointer;
      }
      .right {
        text-align: right;
      }
      .input-box {
        margin-top: 15px;
      }
      textarea {
        font-size: 20px;
        width: 100%;
        height: 100px;
        outline: none;
        box-sizing: border-box;
        padding: 10px;
        border-radius: 8px;
      }

      li b {
        text-decoration: underline;
      }
      li p {
        font-size: 20px;
      }
      li .time {
        float: right;
      }
      .add {
        cursor: pointer;
      }
      .clear:after {
        content: "";
        display: block;
        clear: both;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <h1><center>评论练习</center></h1>
      <ul></ul>
      <div class="input-box">
        <textarea></textarea>
        <div class="right">
          <b class="add" onclick="Add()">评论</b>
        </div>
      </div>
    </div>
    <script>
      let Text = document.querySelector("textarea");

      let comments = [
        {
          name: "张三1",
          text: "留言第一条",
          time: "2021-3-2 16:32:20",
        },
      ];
      // 添加评论
      function Add() {
        if (Text.value.length) {
          comments[comments.length] = {
            name: comments.length ? formatName() : "张三1",
            text: Text.value,
            time: formatDate(new Date()),
          };
          Text.value = "";
          showComments();
        } else {
          alert("请输入评论！");
        }
      }
      // 展示评论
      function showComments() {
        let ul = document.querySelectorAll("ul")[0];
        ul.innerHTML = "";
        for (const even of comments) {
          const li = document.createElement("li");
          li.innerHTML = `
              <div class="clear"><span class="name">${even.name}</span><span class="time">${even.time}</span></div>
              <p>${even.text}</p>
              <div class="right"><b class="del-btn">删除</b></div>
              `;
          ul.append(li);
        }
        delComments(document.querySelectorAll(".del-btn"));
      }
      // 格式化名字
      function formatName() {
        let lastname = comments[comments.length - 1].name;
        let newNum = lastname[lastname.length - 1] * 1 + 1;
        return "张三" + newNum;
      }
      // 格式化日期
      function formatDate(time) {
        return `
      ${time.getFullYear()}-${
          time.getMonth() + 1
        }-${time.getDate()} ${time.getHours()}:${time.getMinutes()}:${time.getSeconds()}
      `;
      }
      // 删除评论
      function delComments(delBtn) {
        for (const index in delBtn) {
          delBtn[index].onclick = () => {
            comments.splice(index, 1);
            showComments();
          };
        }
      }
      showComments();
    </script>
  </body>
</html>
