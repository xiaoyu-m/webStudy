<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>超时调用</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #root {
        width: 666px;
        margin: 15px auto;
        background-color: #efefef;
        padding: 20px;
        border-radius: 8px;
      }
      #root h1 {
        color: #999;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <h2>
        <b class="start-btn">开始</b>
        <b class="stop-btn">停止</b>
      </h2>
      <h1 class="content"></h1>
    </div>
    <script>
      let main = null;
      let Content = document.getElementsByClassName("content")[0];

      document.getElementsByClassName("start-btn")[0].onclick = () => {
        main = setInterval(() => {
          Content.innerHTML = formatDate(new Date());
        }, 1000);
      };
      document.getElementsByClassName("stop-btn")[0].onclick = () => {
        clearInterval(main);
      }; // 格式化日期
      function formatDate(time) {
        return `
      ${time.getFullYear()}-${
          time.getMonth() + 1
        }-${time.getDate()} ${time.getHours()}:${time.getMinutes()}:${time.getSeconds()}
      `;
      }
    </script>
  </body>
</html>
