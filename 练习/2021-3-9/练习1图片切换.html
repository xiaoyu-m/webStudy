<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>图片切换</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      img {
        width: 420px;
      }
      #root {
        margin: 50px;
      }
      div {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div>
        <button>第一张</button>
        <button>第二张</button>
        <button>第三张</button>
      </div>
      <div>
        <img src="./images/1.jpg" />
      </div>
    </div>
    <script>
      let btns = document.getElementsByTagName("button");
      for (const index in [...btns]) {
        btns[index].onclick = () => {
          let img = document.getElementsByTagName("img")[0];
          img.setAttribute("src", `./images/${index * 1 + 1}.jpg`);
        };
      }
    </script>
  </body>
</html>
